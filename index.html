<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeBron James Memory Game</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Header Controls -->
<div class="header-controls">
  <button id="settings-btn" class="control-btn" title="Settings"></button>
  <div class="sound-control">
    <button id="sound-btn" class="control-btn" title="Toggle Sound"></button>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" class="hidden">
  </div>
</div>

  <!-- Best Score Display -->
  <div class="best-score" id="best-score" title="Click to view all best records">Best: --</div>

  <div class="best-score-modal hidden" id="best-score-modal">
    <div class="best-score-modal-content">
      <button id="close-best-score-modal">Close</button>
    </div>
  </div>

  <!-- Audio Elements -->
  <audio id="bgm" loop>
    <source src="Assets/Audio/LeR&B Song.mp3" type="audio/mp3">
  </audio>
  <audio id="flip-sound">
    <source src="Assets/Audio/flip.wav" type="audio/wav">
  </audio>
  <audio id="match-sound">
    <source src="Assets/Audio/match.wav" type="audio/wav">
  </audio>
  <audio id="victory-sound">
    <source src="Assets/Audio/comeonman.mp3" type="audio/mp3">
  </audio>
  <audio id="game-over-sound">
    <source src="Assets/Audio/heartbloodsweat.wav" type="audio/wav">
  </audio>

  <!-- Settings Modal -->
  <div class="settings-modal hidden" id="settings-modal">
    <div class="settings-content">
      <div class="settings-title">CHOOSE DIFFICULTY</div>
      <div class="difficulty-grid">
        <div class="difficulty-item">
          <button class="difficulty-btn easy" data-difficulty="12" data-time="120">
            <img src="Assets/Images/easy.png" alt="LeEasy" class="difficulty-image">
            <div class="difficulty-overlay">
              <span class="difficulty-label">LeEasy</span>
              <span class="difficulty-label">12 Cards</span>
            </div>
          </button>
        </div>
        <div class="difficulty-item">
          <button class="difficulty-btn medium" data-difficulty="8" data-time="90">
            <img src="Assets/Images/medium.png" alt="LeMedium" class="difficulty-image">
            <div class="difficulty-overlay">
              <span class="difficulty-label">LeMedium</span>
              <span class="difficulty-label">16 Cards</span>
            </div>
          </button>
        </div>
        <div class="difficulty-item">
          <button class="difficulty-btn hard" data-difficulty="4" data-time="60">
            <img src="Assets/Images/hard.png" alt="LeHard" class="difficulty-image">
            <div class="difficulty-overlay">
              <span class="difficulty-label">LeHard</span>
              <span class="difficulty-label">20 Cards</span>
            </div>
          </button>
        </div>
        <div class="difficulty-item">
          <button class="difficulty-btn extreme" data-difficulty="0" data-time="45">
            <img src="Assets/Images/extreme.png" alt="LeExtreme" class="difficulty-image">
            <div class="difficulty-overlay">
              <span class="difficulty-label">LeExtreme</span>
              <span class="difficulty-label">24 Cards</span>
            </div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Game Title -->
  <h1 class="page-title">LeBron James Memory Game</h1>

  <!-- Game Container -->
  <div class="game-container">
    <div class="game-info-container">
      <div class="game-info">Time <span id="time-remaining">100</span></div>
      <div class="game-info">Flips <span id="flips">0</span></div>
    </div>
    
    <!-- Cards will be generated by JavaScript -->
  </div>

  <!-- Overlays -->
  <div class="overlay" id="start-overlay">
    Click to Start
    <div class="overlay-subtitle">Match all the LeBron cards!</div>
  </div>

  <div class="overlay hidden" id="victory-overlay">
    VICTORY!
    <div class="overlay-subtitle">Click to Play Again</div>
    <div class="new-record hidden" id="new-record">🏆 NEW RECORD! 🏆</div>
  </div>

  <div class="overlay hidden" id="game-over-overlay">
    GAME OVER
    <div class="overlay-subtitle">Time's Up! Click to Try Again</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
