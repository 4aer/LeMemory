<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeBron James Memory Game</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Header Controls -->
  <div class="header-controls">
    <button id="settings-btn" class="control-btn" title="Settings"></button>
    <button id="mute-btn" class="control-btn" title="Toggle Sound"></button>
  </div>

  <!-- Best Score Display -->
  <div class="best-score" id="best-score">Best: --</div>

  <!-- Audio Elements -->
  <audio id="bgm" loop>
    <source src="Assets/Audio/lebron lebron lebron james.mp3" type="audio/mp3">
  </audio>
  <audio id="flip-sound">
    <source src="Assets/Audio/flip.wav" type="audio/wav">
  </audio>
  <audio id="match-sound">
    <source src="Assets/Audio/match.wav" type="audio/wav">
  </audio>
  <audio id="victory-sound">
    <source src="Assets/Audio/comeonman.mp3" type="audio/mp3">
  </audio>
  <audio id="game-over-sound">
    <source src="Assets/Audio/gameover.wav" type="audio/wav">
  </audio>

  <!-- Settings Modal -->
  <div class="settings-modal hidden" id="settings-modal">
    <div class="settings-content">
      <div class="settings-title">CHOOSE DIFFICULTY</div>
      <div class="difficulty-grid">
        <button class="difficulty-btn easy" data-difficulty="12" data-time="120"></button>
        <button class="difficulty-btn medium" data-difficulty="8" data-time="90"></button>
        <button class="difficulty-btn hard" data-difficulty="4" data-time="60"></button>
        <button class="difficulty-btn extreme" data-difficulty="0" data-time="45"></button>
      </div>
    </div>
  </div>

  <!-- Game Title -->
  <h1 class="page-title">LeBron James Memory Game</h1>

  <!-- Game Container -->
  <div class="game-container">
    <div class="game-info-container">
      <div class="game-info">Time <span id="time-remaining">100</span></div>
      <div class="game-info">Flips <span id="flips">0</span></div>
    </div>
    
    <!-- Cards will be generated by JavaScript -->
  </div>

  <!-- Overlays -->
  <div class="overlay" id="start-overlay">
    Click to Start
    <div class="overlay-subtitle">Match all the LeBron cards!</div>
  </div>

  <div class="overlay hidden" id="victory-overlay">
    VICTORY!
    <div class="overlay-subtitle">Click to Play Again</div>
    <div class="new-record hidden" id="new-record">🏆 NEW RECORD! 🏆</div>
  </div>

  <div class="overlay hidden" id="game-over-overlay">
    GAME OVER
    <div class="overlay-subtitle">Time's Up! Click to Try Again</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
