<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeBron James Memory Game - Login</title>
    <link rel="stylesheet" href="login-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Animated background elements -->
    <div class="bg-element"></div>
    <div class="bg-element"></div>
    <div class="bg-element"></div>

    <div class="auth-container">
        <h1 class="game-title">LeMemory</h1>
        <p class="game-subtitle">LeBron James Memory Game</p>

        <div class="form-container">
            <!-- Tab Navigation -->
            <div class="form-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Success/Error Messages -->
            <div id="message-container"></div>

            <!-- Login Form -->
            <form id="login-form" class="form active">
                <div class="form-group">
                    <label class="form-label" for="login-username">Username</label>
                    <input type="text" id="login-username" class="form-input" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <div class="password-toggle">
                        <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
                        <button type="button" class="toggle-btn" onclick="togglePassword('login-password')">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">Login</button>
                
                <div class="forgot-password">
                    <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
                </div>
            </form>

            <!-- Registration Form -->
            <form id="register-form" class="form">
                <div class="form-group">
                    <label class="form-label" for="register-username">Username</label>
                    <input type="text" id="register-username" class="form-input" placeholder="Choose a username" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="register-email">Email</label>
                    <input type="email" id="register-email" class="form-input" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="register-password">Password</label>
                    <div class="password-toggle">
                        <input type="password" id="register-password" class="form-input" placeholder="Create a password" required>
                        <button type="button" class="toggle-btn" onclick="togglePassword('register-password')">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="register-confirm">Confirm Password</label>
                    <div class="password-toggle">
                        <input type="password" id="register-confirm" class="form-input" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-btn" onclick="togglePassword('register-confirm')"></button>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">Register</button>
            </form>

            <!-- Success State -->
            <div id="success-state" style="display: none;">
                <div class="success-message">
                    Welcome to LeMemory! Ready to test your skills?
                </div>
                <button class="play-game-btn" onclick="startGame()">Start Playing</button>
            </div>
        </div>
    </div>

    <script src="login-script.js"></script>
</body>
</html>
