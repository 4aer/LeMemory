<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeBron James Memory Game</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ── Custom font ── */
    @font-face {
      font-family: "NBACavaliers";
      src: url("Assets/Fonts/NBACavaliers.ttf") format("truetype");
    }
    body { font-family: NBACavaliers, serif; }

    /* ── Card CSS custom properties ── */
    .card-container {
      --cols: 4;
      --gap: clamp(4px, 1.2vw, 10px);
      --card-w: min(
        calc((min(96vw, 680px) - (var(--cols) - 1) * var(--gap)) / var(--cols)),
        125px
      );
      --card-h: calc(var(--card-w) * 7 / 5);
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--card-w));
      gap: var(--gap);
      margin: 8px auto;
      width: fit-content;
      max-width: 96vw;
      perspective: 500px;
    }

    .card {
      position: relative;
      width: var(--card-w);
      height: var(--card-h);
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    /* ── 3D flip ── */
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 12px;
      border: 2px solid;
      transition: transform 350ms ease-in-out;
    }
    .card-back  { background-color: black; border-color: #FDBB30; transform: rotateY(0deg); }
    .card-front { background-color: #041E42; border-color: #333;   transform: rotateY(180deg); }
    .card.visible .card-back  { transform: rotateY(-180deg); }
    .card.visible .card-front { transform: rotateY(0deg); }

    .card-value, .card-back-img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 100ms ease-in-out;
    }

    /* Card hover lift — :hover:not(.matched) not expressible as Tailwind utility */
    .card:hover:not(.matched) {
      transform: translateY(-6px) scale(1.04);
      filter: drop-shadow(0 12px 20px rgba(0,0,0,0.5));
    }

    /* Matched card glow + bounce */
    .card.matched { filter: drop-shadow(0 0 10px rgba(253,187,48,0.6)); }
    .card.matched .card-value { animation: celebrate 0.6s cubic-bezier(0.36,0.07,0.19,0.97); }
    @keyframes celebrate {
      0%   { transform: scale(1)    rotate(0deg); }
      20%  { transform: scale(1.2)  rotate(-4deg); }
      40%  { transform: scale(1.15) rotate(4deg); }
      60%  { transform: scale(1.1)  rotate(-2deg); }
      80%  { transform: scale(1.05) rotate(1deg); }
      100% { transform: scale(1)    rotate(0deg); }
    }

    /* Overlay fade-in */
    .overlay.fading-in { animation: fadeIn 0.35s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* New record glow */
    .new-record { animation: glow 2s ease-in-out infinite alternate; }
    @keyframes glow {
      from { text-shadow: 0 0 20px #FFD700; }
      to   { text-shadow: 0 0 30px #FFD700, 0 0 40px #FFD700; }
    }

    /* Timer warning */
    .timer-warning {
      animation: timerPulse 0.6s ease-in-out infinite !important;
      color: #FF4444 !important;
    }
    @keyframes timerPulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(1.08); opacity: 0.8; }
    }

    /* Difficulty hover child selectors — can't express with CDN Tailwind */
    .difficulty-item:hover .difficulty-image  { filter: blur(3px); }
    .difficulty-item:hover .difficulty-overlay { opacity: 1; }

    /* Progress bar */
    .progress-bar-fill {
      background: linear-gradient(90deg, #FDBB30, #FFD060);
      transition: width 0.4s ease;
    }

    /* ── Gear dropdown ── */
    .gear-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 240px;
      background: rgba(10,10,10,0.96);
      border: 1px solid rgba(253,187,48,0.25);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 1100;
    }
    .gear-dropdown.hidden { display: none; }

    .dropdown-label {
      font-size: 0.62em;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(253,187,48,0.5);
      margin-bottom: 4px;
    }

    /* Current difficulty button inside dropdown */
    #dropdown-diff-btn {
      width: 100%;
      padding: 9px 12px;
      background: rgba(253,187,48,0.09);
      border: 1px solid rgba(253,187,48,0.35);
      border-radius: 8px;
      color: #FDBB30;
      font-family: NBACavaliers, serif;
      font-size: 0.85em;
      letter-spacing: 2px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    #dropdown-diff-btn:hover  { background: rgba(253,187,48,0.18); border-color: #FDBB30; }
    #dropdown-diff-btn:active { transform: scale(0.97); }

    /* Volume row */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .volume-icon-btn {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border-radius: 7px;
      border: 1px solid rgba(253,187,48,0.3);
      background: rgba(253,187,48,0.07);
      color: #FDBB30;
      font-size: 1em;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .volume-icon-btn:hover  { background: rgba(253,187,48,0.18); }
    .volume-icon-btn:active { transform: scale(0.92); }
    .volume-icon-btn.muted  { color: #666; border-color: rgba(255,255,255,0.12); }

    /* Horizontal volume slider */
    #volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 5px;
      border-radius: 99px;
      background: rgba(253,187,48,0.2);
      outline: none;
      cursor: pointer;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px; height: 15px;
      border-radius: 50%;
      background: #FDBB30;
      cursor: pointer;
      transition: transform 0.1s;
    }
    #volume-slider::-webkit-slider-thumb:hover { transform: scale(1.25); }
    #volume-slider::-moz-range-thumb {
      width: 15px; height: 15px;
      border-radius: 50%;
      background: #FDBB30;
      border: none;
      cursor: pointer;
    }
    #volume-slider::-moz-range-track {
      height: 5px; border-radius: 99px;
      background: rgba(253,187,48,0.2);
    }

    @media (max-width: 400px) {
      .gear-dropdown { width: 210px; right: -4px; }
    }

    /* ── Best Score Modal — styled (JS injects HTML with these class names) ── */
    .best-score-list-title {
      font-size: 1.4em;
      font-weight: bold;
      text-align: center;
      color: #FDBB30;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(253,187,48,0.3);
    }
    .best-score-list {
      list-style: none;
      padding: 0;
      margin: 0 0 16px 0;
      width: 100%;
    }
    .best-score-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      margin-bottom: 6px;
      border-radius: 8px;
      font-size: 1.05em;
      background: rgba(253,187,48,0.07);
      border: 1px solid rgba(253,187,48,0.15);
      transition: background 0.2s;
    }
    .best-score-list li:hover { background: rgba(253,187,48,0.14); }
    .best-score-list li span { color: #FDBB30; font-weight: bold; }

    /* Mobile — swap bg, stack HUD */
    @media (max-width: 600px) {
      body { background-image: url("Assets/Images/LeBackgroundPortrait.png") !important; }
      .game-info-container { flex-direction: column; gap: 2px; align-items: center; }
      .difficulty-grid { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 380px) {
      .difficulty-grid { grid-template-columns: 1fr !important; }
    }

    /* Start overlay difficulty pills */
    .start-diff-pill {
      padding: 7px 18px;
      border: 1.5px solid rgba(253,187,48,0.4);
      border-radius: 8px;
      background: rgba(0,0,0,0.4);
      color: #FDBB30;
      font-family: NBACavaliers, serif;
      font-size: 0.22em;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      pointer-events: auto;
    }
    .start-diff-pill:hover  { background: rgba(253,187,48,0.15); border-color: #FDBB30; }
    .start-diff-pill:active { transform: scale(0.95); }
    .start-diff-pill.active {
      background: #FDBB30;
      color: #041E42;
      border-color: #FDBB30;
      font-weight: bold;
    }
  </style>
</head>

<body class="flex justify-center items-center flex-col min-h-screen m-0
             bg-cover bg-center bg-no-repeat
             [background-image:url('Assets/Images/LeBackground.png')]">

  <!-- ── Header: Gear button + dropdown ── -->
  <div class="fixed top-5 right-5 z-[1100]" id="gear-container">

    <!-- Gear button -->
    <button id="gear-btn" title="Settings"
            class="w-[50px] h-[50px] border-0 rounded-xl cursor-pointer bg-transparent
                   bg-cover bg-center transition-transform duration-200
                   hover:scale-110 active:scale-95
                   [background-image:url('Assets/Images/SettingsButton.png')]">
    </button>

    <!-- Dropdown panel -->
    <div id="gear-dropdown" class="gear-dropdown hidden">

      <!-- Difficulty section -->
      <div>
        <div class="dropdown-label">Difficulty</div>
        <button id="dropdown-diff-btn" title="Change difficulty">
          <span id="dropdown-diff-label">LeEasy</span>
        </button>
      </div>

      <!-- Divider -->
      <div style="height:1px;background:rgba(253,187,48,0.15)"></div>

      <!-- Volume section -->
      <div>
        <div class="dropdown-label">Volume</div>
        <div class="volume-row">
          <button id="volume-icon-btn" class="volume-icon-btn" title="Mute / Unmute">🔊</button>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
          <span id="volume-pct" class="text-[#FDBB30] text-[0.68em] w-8 text-right select-none">100%</span>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Best Score ── -->
  <div id="best-score" title="Click to view all best records"
       class="fixed top-5 left-5 z-[1000] cursor-pointer text-[#FDBB30] text-[2em]
              bg-black/70 px-5 py-2.5 rounded-[10px]">
    Best: --
  </div>

  <!-- ── Best Score Modal (content injected by JS) ── -->
  <div id="best-score-modal"
       class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2
              bg-[#1a1a1a] text-[#FDBB30] rounded-2xl z-[2000] w-[320px]
              shadow-[0_0_40px_rgba(0,0,0,0.8)] border border-[rgba(253,187,48,0.2)]
              overflow-hidden">
    <div class="best-score-modal-content flex flex-col items-center p-7">
      <button id="close-best-score-modal"
              class="mt-2 px-6 py-2.5 bg-[#FDBB30] text-[#041E42] border-0
                     rounded-lg text-[1em] cursor-pointer font-bold tracking-widest
                     transition-transform duration-150 hover:scale-105 active:scale-95
                     [font-family:NBACavaliers,serif]">
        Close
      </button>
    </div>
  </div>

  <!-- ── Audio ── -->
  <audio id="bgm" loop class="hidden"><source src="Assets/Audio/LeR&B Song.mp3" type="audio/mp3"></audio>
  <audio id="flip-sound"     class="hidden"><source src="Assets/Audio/flip.wav"             type="audio/wav"></audio>
  <audio id="match-sound"    class="hidden"><source src="Assets/Audio/match.wav"            type="audio/wav"></audio>
  <audio id="victory-sound"  class="hidden"><source src="Assets/Audio/comeonman.mp3"        type="audio/mp3"></audio>
  <audio id="game-over-sound"class="hidden"><source src="Assets/Audio/heartbloodsweat.wav"  type="audio/wav"></audio>

  <!-- ── Settings Modal ── -->
  <!-- IMPORTANT: keep class "settings-modal" so JS click-outside check works -->
  <div id="settings-modal"
       class="settings-modal hidden fixed inset-0 bg-black/80 flex justify-center items-center z-[2000]">

    <div class="relative flex flex-col justify-center items-center text-white text-center
                rounded-[25px] p-10 bg-cover bg-center
                w-[min(1200px,90vw)] h-[min(800px,80vh)]
                [background-image:url('Assets/Images/SettingsBG.png')]
                max-sm:w-[95vw] max-sm:h-[85vh] max-sm:p-5">

      <button id="close-settings-btn"
              class="absolute top-4 right-4 w-10 h-10 rounded-full
                     bg-black/50 border border-white/20 text-white
                     text-xl cursor-pointer flex items-center justify-center
                     transition-all duration-200 hover:bg-black/80 hover:scale-110
                     active:scale-95 z-10">
        ✕
      </button>

      <div class="text-[4em] mb-5 max-sm:text-[2.5em]">CHOOSE DIFFICULTY</div>

      <div class="difficulty-grid grid grid-cols-2 gap-5 mt-2.5 w-full max-w-[650px] justify-items-center">

        <!-- LeEasy -->
        <div class="difficulty-item relative overflow-hidden rounded-xl flex mx-auto
                    shadow-[0_4px_12px_rgba(0,0,0,0.15)] w-[300px] h-[191px]
                    max-sm:w-full max-sm:h-auto max-sm:[aspect-ratio:300/191]">
          <button class="difficulty-btn easy p-0 border-0 rounded-xl cursor-pointer
                         bg-cover w-[300px] h-[191px] transition-transform duration-200
                         max-sm:w-full max-sm:h-full"
                  data-difficulty="12" data-time="120">
            <img src="Assets/Images/easy.png" alt="LeEasy"
                 class="difficulty-image w-full h-full object-cover rounded-xl transition-[filter] duration-300">
            <div class="difficulty-overlay absolute inset-0 bg-black/50 flex flex-col
                        justify-center items-center opacity-0 rounded-xl transition-opacity duration-300">
              <span class="text-white font-bold tracking-[2px] text-[2.5em] max-sm:text-[1.8em]
                           [font-family:Verdana,Geneva,Tahoma,sans-serif] [text-shadow:2px_2px_8px_#000]">LeEasy</span>
              <span class="text-white font-bold tracking-[2px] text-[2.5em] max-sm:text-[1.8em]
                           [font-family:Verdana,Geneva,Tahoma,sans-serif] [text-shadow:2px_2px_8px_#000]">12 Cards</span>
            </div>
          </button>
        </div>

        <!-- LeMedium -->
        <div class="difficulty-item relative overflow-hidden rounded-xl flex mx-auto
                    shadow-[0_4px_12px_rgba(0,0,0,0.15)] w-[300px] h-[191px]
                    max-sm:w-full max-sm:h-auto max-sm:[aspect-ratio:300/191]">
          <button class="difficulty-btn medium p-0 border-0 rounded-xl cursor-pointer
                         bg-cover w-[300px] h-[191px] transition-transform duration-200
                         max-sm:w-full max-sm:h-full"
                  data-difficulty="8" data-time="90">
            <img src="Assets/Images/medium.png" alt="LeMedium"
                 class="difficulty-image w-full h-full object-cover rounded-xl transition-[filter] duration-300">
            <div class="difficulty-overlay absolute inset-0 bg-black/50 flex flex-col
                        justify-center items-center opacity-0 rounded-xl transition-opacity duration-300">
              <span class="text-white font-bold tracking-[2px] text-[2.5em] max-sm:text-[1.8em]
                           [font-family:Verdana,Geneva,Tahoma,sans-serif] [text-shadow:2px_2px_8px_#000]">LeMedium</span>
              <span class="text-white font-bold tracking-[2px] text-[2.5em] max-sm:text-[1.8em]
                           [font-family:Verdana,Geneva,Tahoma,sans-serif] [text-shadow:2px_2px_8px_#000]">16 Cards</span>
            </div>
          </button>
        </div>

        <!-- LeHard -->
        <div class="difficulty-item relative overflow-hidden rounded-xl flex mx-auto
                    shadow-[0_4px_12px_rgba(0,0,0,0.15)] w-[300px] h-[191px]
                    max-sm:w-full max-sm:h-auto max-sm:[aspect-ratio:300/191]">
          <button class="difficulty-btn hard p-0 border-0 rounded-xl cursor-pointer
                         bg-cover w-[300px] h-[191px] transition-transform duration-200
                         max-sm:w-full max-sm:h-full"
                  data-difficulty="4" data-time="60">
            <img src="Assets/Images/hard.png" alt="LeHard"
                 class="difficulty-image w-full h-full object-cover rounded-xl transition-[filter] duration-300">
            <div class="difficulty-overlay absolute inset-0 bg-black/50 flex flex-col
                        justify-center items-center opacity-0 rounded-xl transition-opacity duration-300">
              <span class="text-white font-bold tracking-[2px] text-[2.5em] max-sm:text-[1.8em]
                           [font-family:Verdana,Geneva,Tahoma,sans-serif] [text-shadow:2px_2px_8px_#000]">LeHard</span>
              <span class="text-white font-bold tracking-[2px] text-[2.5em] max-sm:text-[1.8em]
                           [font-family:Verdana,Geneva,Tahoma,sans-serif] [text-shadow:2px_2px_8px_#000]">20 Cards</span>
            </div>
          </button>
        </div>

        <!-- LeExtreme -->
        <div class="difficulty-item relative overflow-hidden rounded-xl flex mx-auto
                    shadow-[0_4px_12px_rgba(0,0,0,0.15)] w-[300px] h-[191px]
                    max-sm:w-full max-sm:h-auto max-sm:[aspect-ratio:300/191]">
          <button class="difficulty-btn extreme p-0 border-0 rounded-xl cursor-pointer
                         bg-cover w-[300px] h-[191px] transition-transform duration-200
                         max-sm:w-full max-sm:h-full"
                  data-difficulty="0" data-time="45">
            <img src="Assets/Images/extreme.png" alt="LeExtreme"
                 class="difficulty-image w-full h-full object-cover rounded-xl transition-[filter] duration-300">
            <div class="difficulty-overlay absolute inset-0 bg-black/50 flex flex-col
                        justify-center items-center opacity-0 rounded-xl transition-opacity duration-300">
              <span class="text-white font-bold tracking-[2px] text-[2.5em] max-sm:text-[1.8em]
                           [font-family:Verdana,Geneva,Tahoma,sans-serif] [text-shadow:2px_2px_8px_#000]">LeExtreme</span>
              <span class="text-white font-bold tracking-[2px] text-[2.5em] max-sm:text-[1.8em]
                           [font-family:Verdana,Geneva,Tahoma,sans-serif] [text-shadow:2px_2px_8px_#000]">24 Cards</span>
            </div>
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Game Title ── -->
  <h1 class="text-[#860038] font-normal text-center text-[clamp(2em,6vw,4.5em)]
             mt-5 mb-5 [text-shadow:2px_2px_4px_rgba(0,0,0,0.5)]">
    LeBron James Memory Game
  </h1>

  <!-- ── HUD ── -->
  <div class="game-info-container flex justify-between items-center mb-2.5
              gap-[clamp(2em,10vw,8em)] w-[min(96vw,680px)]">
    <div id="time-info"
         class="game-info text-[#FDBB30] whitespace-nowrap text-[clamp(1.8em,5vw,4em)]
                [text-shadow:2px_2px_4px_rgba(0,0,0,0.5)]">
      TIME: <span id="time-remaining">--</span>
    </div>
    <div id="flips-info"
         class="game-info text-[#FDBB30] whitespace-nowrap text-[clamp(1.8em,5vw,4em)]
                [text-shadow:2px_2px_4px_rgba(0,0,0,0.5)]">
      FLIPS: <span id="flip-count">0</span>
    </div>
  </div>

  <!-- ── Progress Bar ── -->
  <div class="w-[min(520px,80vw)] h-2 bg-white/15 rounded-full overflow-hidden mb-2">
    <div id="progress-bar" class="progress-bar-fill h-full rounded-full w-0"></div>
  </div>

  <!-- ── Card Grid (JS-generated) ── -->
  <div class="card-container"></div>

  <!-- ── Start Overlay ── -->
  <div id="start-overlay"
       class="overlay fixed inset-0 flex flex-col justify-center items-center z-[1500]
              text-[#FDBB30] text-center bg-black/90 cursor-pointer
              text-[clamp(3em,8vw,8em)] transition-opacity duration-300">
    LeMemory

    <!-- Current difficulty label -->
    <div class="text-[0.28em] mt-4 opacity-75 tracking-widest uppercase">
      Playing on: <span id="overlay-difficulty-label" class="text-[#FDBB30] font-bold">LeEasy</span>
    </div>

    <!-- Difficulty pill selector -->
    <div class="flex gap-2 mt-3 flex-wrap justify-center" id="start-diff-pills">
      <button class="start-diff-pill active" data-difficulty="12" data-time="120">LeEasy</button>
      <button class="start-diff-pill"        data-difficulty="8"  data-time="90">LeMedium</button>
      <button class="start-diff-pill"        data-difficulty="4"  data-time="60">LeHard</button>
      <button class="start-diff-pill"        data-difficulty="0"  data-time="45">LeExtreme</button>
    </div>

    <div class="text-[0.22em] mt-3 opacity-60">Match all the LeBron cards!</div>
    <div id="start-best-hint" class="text-[0.2em] mt-1 text-[#FDBB30] opacity-60"></div>

    <button id="start-btn"
            class="new-game-btn mt-6 px-9 py-3.5 bg-[#FDBB30] text-[#041E42] border-0
                   rounded-[10px] text-[0.25em] cursor-pointer tracking-[2px] pointer-events-auto
                   transition-[transform,background] duration-150 min-h-[44px]
                   hover:bg-[#FFD060] hover:scale-[1.06] active:scale-[0.97]
                   [font-family:NBACavaliers,serif]">
      Start Game
    </button>
  </div>

  <!-- ── Victory Overlay ── -->
  <div id="victory-overlay"
       class="overlay hidden fixed inset-0 flex flex-col justify-center items-center z-[1500]
              text-[#FDBB30] text-center bg-black/90 cursor-pointer
              text-[clamp(3em,8vw,8em)] transition-opacity duration-300">
    VICTORY!
    <div id="game-summary"
         class="flex gap-7 mt-4 text-[0.22em] text-white/85 tracking-wide flex-wrap justify-center">
      <div class="flex flex-col items-center gap-1">
        <span class="text-[0.75em] uppercase opacity-70">Flips</span>
        <span id="summary-flips" class="text-[#FDBB30] text-[1.3em]">--</span>
      </div>
      <div class="flex flex-col items-center gap-1">
        <span class="text-[0.75em] uppercase opacity-70">Time Left</span>
        <span id="summary-time" class="text-[#FDBB30] text-[1.3em]">--</span>
      </div>
      <div class="flex flex-col items-center gap-1">
        <span class="text-[0.75em] uppercase opacity-70">Difficulty</span>
        <span id="summary-difficulty" class="text-[#FDBB30] text-[1.3em]">--</span>
      </div>
    </div>
    <div id="new-record" class="new-record hidden text-[#FFD700] text-[0.4em] mt-2.5">
      NEW RECORD!
    </div>
    <button id="victory-btn"
            class="new-game-btn mt-8 px-9 py-3.5 bg-[#FDBB30] text-[#041E42] border-0
                   rounded-[10px] text-[0.25em] cursor-pointer tracking-[2px] pointer-events-auto
                   transition-[transform,background] duration-150 min-h-[44px]
                   hover:bg-[#FFD060] hover:scale-[1.06] active:scale-[0.97]
                   [font-family:NBACavaliers,serif]">
      Play Again
    </button>
  </div>

  <!-- ── Game Over Overlay ── -->
  <div id="game-over-overlay"
       class="overlay hidden fixed inset-0 flex flex-col justify-center items-center z-[1500]
              text-[#FDBB30] text-center bg-black/90 cursor-pointer
              text-[clamp(3em,8vw,8em)] transition-opacity duration-300">
    GAME OVER
    <div class="text-[0.3em] mt-5 opacity-80">Time's Up!</div>
    <button id="game-over-btn"
            class="new-game-btn mt-8 px-9 py-3.5 bg-[#FDBB30] text-[#041E42] border-0
                   rounded-[10px] text-[0.25em] cursor-pointer tracking-[2px] pointer-events-auto
                   transition-[transform,background] duration-150 min-h-[44px]
                   hover:bg-[#FFD060] hover:scale-[1.06] active:scale-[0.97]
                   [font-family:NBACavaliers,serif]">
      Try Again
    </button>
  </div>

  <!-- ── Confetti Canvas ── -->
  <canvas id="confetti-canvas" class="fixed inset-0 w-full h-full pointer-events-none z-[1499]"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>

  <!-- Wire up the X button and close-settings-btn in a small inline script
       so it works even if UIManager hasn't finished init yet -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('close-settings-btn')?.addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('settings-modal')?.classList.add('hidden');
      });
    });
  </script>
</body>
</html>
